[test]
coverage = true
coverageSkipTestFiles = true
coverageReporter = ["text"]
# Gate on line + statement coverage per file (90%). The function metric is
# dropped: it counts every inline callback, and the CLI has a few that are
# untestable by design (the process.exit bootstrap, the fetch-timeout abort,
# and a defensive .catch), which can't reach 90% per file without test theater.
coverageThreshold = { line = 0.90, statement = 0.90 }
